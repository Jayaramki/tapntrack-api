---
deployment:
  tasks:
    # Install PHP dependencies (skips dev packages, optimizes autoloader)
    # If 'composer' is not in PATH on your host, replace with: php composer.phar install ...
    - composer install --no-dev --optimize-autoloader --no-interaction

    # Ensure writable directories exist (safe to re-run)
    - mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache

    # Clear stale caches before migrating (avoids cached old config blocking migration)
    - php artisan optimize:clear

    # Run any pending migrations
    - php artisan migrate --force

    # Build production caches
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache

    # Ensure storage and cache dirs are writable by the web server
    - chmod -R 755 storage
    - chmod -R 755 bootstrap/cache
