---
deployment:
  tasks:
    # ── Composer ─────────────────────────────────────────────────────────────
    # vendor/ is pre-built by GitHub Actions and committed to the deploy branch.
    # composer install is skipped — nothing to download on the server.

    # ── Environment ──────────────────────────────────────────────────────────
    # Create .env from example on first deploy (already has DB credentials)
    - test -f .env || cp .env.example .env
    # Force production settings regardless of what .env.example says
    - sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env
    - sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
    # Generate APP_KEY only when not already set — skipped on every subsequent deploy
    - grep -q "^APP_KEY=base64:" .env || php artisan key:generate

    # ── Storage directories ───────────────────────────────────────────────────
    # Laravel requires these subdirs; safe to re-run
    - mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache
    - chmod -R 755 storage bootstrap/cache

    # ── Caches ───────────────────────────────────────────────────────────────
    # Clear any stale cached config/routes before migration runs
    - php artisan optimize:clear

    # ── Database ─────────────────────────────────────────────────────────────
    - php artisan migrate --force
    # Seed only on first deploy — sentinel file prevents re-seeding on future deploys
    - test -f storage/.seeded || (php artisan db:seed --force && touch storage/.seeded)

    # ── Production caches ────────────────────────────────────────────────────
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache
