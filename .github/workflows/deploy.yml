name: Build & Prepare Deploy Branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Update Composer dependencies and fix lock file
        run: composer update --no-dev --optimize-autoloader --no-interaction

      - name: Commit updated composer.lock back to main if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet composer.lock; then
            echo "composer.lock unchanged"
          else
            git add composer.lock
            git commit -m "chore: sync composer.lock [skip ci]"
            git push origin main
          fi

      - name: Push deploy branch with vendor included
        run: |
          git checkout -B deploy
          git add -f vendor/
          git commit -m "build: include vendor for deployment [skip ci]"
          git push origin deploy --force
